<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>A-Frame GLB Character</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-orbit-controls-component@1.3.2/dist/aframe-orbit-controls-component.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #050505;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <a-scene
    background="color: #050505"
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
    shadow="type: pcfsoft"
  >
    <a-assets>
      <a-asset-item id="characterModel" src="avatar.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient" color="#666" intensity="0"></a-light>

    <a-light
      id="mainLight"
      type="directional"
      color="#ffffff"
      intensity="0.5"
      position="0 5 3"
      cast-shadow="true"
      shadow-map-width="2048"
      shadow-map-height="2048"
      shadow-camera-top="10"
      shadow-camera-bottom="-10"
      shadow-camera-left="-10"
      shadow-camera-right="10"
      shadow-camera-near="0.1"
      shadow-camera-far="30"
      shadow-bias="0.00005">
    </a-light>
    
    <a-light
      id="mainLight"
      type="directional"
      color="#ffffff"
      intensity="0.5"
      position="2 5 3"
      cast-shadow="true"
      shadow-map-width="2048"
      shadow-map-height="2048"
      shadow-camera-top="10"
      shadow-camera-bottom="-10"
      shadow-camera-left="-10"
      shadow-camera-right="10"
      shadow-camera-near="0.1"
      shadow-camera-far="30"
      shadow-bias="0.00005">
    </a-light>
    
    <a-light
      id="mainLight"
      type="directional"
      color="#ffffff"
      intensity="0.5"
      position="-2 5 3"
      cast-shadow="true"
      shadow-map-width="2048"
      shadow-map-height="2048"
      shadow-camera-top="10"
      shadow-camera-bottom="-10"
      shadow-camera-left="-10"
      shadow-camera-right="10"
      shadow-camera-near="0.1"
      shadow-camera-far="30"
      shadow-bias="0.00005">
    </a-light>

    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="20"
      height="20"
      color="#111"
      shadow="receive: true">
    </a-plane>

    <a-entity
      id="character"
      gltf-model="#characterModel"
      position="0 0 0"
      rotation="0 0 0"
      scale="1 1 1"
      shadow="cast: true; receive: true">
    </a-entity>

    <a-entity
      camera="fov: 5; near: 0.01; far: 100"
      position="0 -0.1 13.5"
      orbit-controls="
        target: 0 1.2 0;
        minDistance: 1.5;
        maxDistance: 6;
        initialPosition: 0 1.4 3.5;
        enableDamping: true;
        dampingFactor: 0.08">
    </a-entity>

  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    const characterEl = document.getElementById('character');
    const mainLightEl = document.getElementById('mainLight');

    let cabezaBone = null;
    let cabezaBaseRotation = null;
    let cabezaTarget = { x: 0, y: 0, z: 0 };

    function degToRad(v) {
      return THREE.MathUtils.degToRad(v);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function findBoneByName(root, name) {
      let found = null;
      root.traverse((node) => {
        if (!found && node.isBone && node.name === name) {
          found = node;
        }
      });
      return found;
    }

    function listBoneNames(root) {
      const names = [];
      root.traverse((node) => {
        if (node.isBone) names.push(node.name);
      });
      return names;
    }

    function enableShadowsRecursively(root) {
      root.traverse((node) => {
        if (node.isMesh || node.isSkinnedMesh) {
          node.castShadow = true;
          node.receiveShadow = true;
          node.frustumCulled = false;

          if (node.material) {
            if (Array.isArray(node.material)) {
              node.material.forEach((mat) => {
                if (!mat) return;
                mat.needsUpdate = true;
              });
            } else {
              node.material.needsUpdate = true;
            }
          }
        }
      });
    }

    function configureDirectionalShadowLight() {
      const light = mainLightEl.getObject3D('light');
      if (!light) return;

      light.castShadow = true;

      light.shadow.mapSize.width = 2048;
      light.shadow.mapSize.height = 2048;

      light.shadow.bias = 0.00005;
      light.shadow.normalBias = 0.0002;
      light.shadow.radius = 0.5;

      const cam = light.shadow.camera;
      cam.left = -10;
      cam.right = 10;
      cam.top = 10;
      cam.bottom = -10;
      cam.near = 0.1;
      cam.far = 30;
      cam.updateProjectionMatrix();

      if (light.target) {
        light.target.position.set(0, 1, 0);
        if (!light.target.parent) {
          sceneEl.object3D.add(light.target);
        }
      }
    }

    function forceShadowRefresh() {
      if (!sceneEl.renderer) return;
      sceneEl.renderer.shadowMap.enabled = true;
      sceneEl.renderer.shadowMap.needsUpdate = true;
    }

    function applyCabezaRotation() {
      if (!cabezaBone || !cabezaBaseRotation) return;

      const x = clamp(cabezaTarget.x, -30, 30);
      const y = clamp(cabezaTarget.y, -60, 60);
      const z = clamp(cabezaTarget.z, -20, 20);

      cabezaBone.rotation.x = cabezaBaseRotation.x + degToRad(x);
      cabezaBone.rotation.y = cabezaBaseRotation.y + degToRad(y);
      cabezaBone.rotation.z = cabezaBaseRotation.z + degToRad(z);
    }

    mainLightEl.addEventListener('loaded', () => {
      configureDirectionalShadowLight();
      forceShadowRefresh();
    });

    sceneEl.addEventListener('loaded', () => {
      configureDirectionalShadowLight();
      forceShadowRefresh();
    });

    characterEl.addEventListener('model-loaded', (e) => {
      const model = e.detail.model;

      enableShadowsRecursively(model);
      configureDirectionalShadowLight();
      forceShadowRefresh();

      cabezaBone = findBoneByName(model, 'cabeza');

      if (cabezaBone) {
        cabezaBaseRotation = {
          x: cabezaBone.rotation.x,
          y: cabezaBone.rotation.y,
          z: cabezaBone.rotation.z
        };
        console.log('Bone "cabeza" found:', cabezaBone);
      } else {
        console.warn('Bone "cabeza" not found. Bones:', listBoneNames(model));
      }

      console.log('Shadows enabled on GLB meshes, including self-shadowing setup.');
    });

    AFRAME.registerComponent('cabeza-controller', {
      tick: function () {
        applyCabezaRotation();
      }
    });

    sceneEl.setAttribute('cabeza-controller', '');

    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || typeof data !== 'object') return;

      switch (data.type) {
        case 'setCabezaRotation':
          cabezaTarget.x = data.x ?? cabezaTarget.x;
          cabezaTarget.y = data.y ?? cabezaTarget.y;
          cabezaTarget.z = data.z ?? cabezaTarget.z;
          break;

        case 'resetCabezaRotation':
          cabezaTarget.x = 0;
          cabezaTarget.y = 0;
          cabezaTarget.z = 0;
          break;
      }
    });
  </script>
</body>
</html>
